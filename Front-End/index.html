<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rent Verifier | Dashboard</title>
  
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Icons -->
  <script src="https://kit.fontawesome.com/a2e0b7b6b0.js" crossorigin="anonymous"></script>
  
  <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
  
  <!-- Header -->
  <header class="header">
    <div class="header-content">
      <div class="brand">
        <h1><i class="fas fa-shield-alt"></i> Rent Verifier</h1>
      </div>
      <div class="user-actions">
        <button class="btn-signout">
          <i class="fas fa-sign-out-alt"></i>
          Sign Out
        </button>
      </div>
    </div>
  </header>

  <!-- Main Dashboard -->
  <main class="dashboard">
    
    <!-- Stats Cards -->
    <section class="stats-grid">
      <div class="stat-card primary">
        <div class="stat-icon">
          <i class="fas fa-money-bill-wave"></i>
        </div>
        <div class="stat-content">
          <h3>Total Received</h3>
          <p class="stat-value">Ksh 0</p>
        </div>
      </div>
      
      <div class="stat-card success">
        <div class="stat-icon">
          <i class="fas fa-check-circle"></i>
        </div>
        <div class="stat-content">
          <h3>Verified</h3>
          <p class="stat-value">0</p>
        </div>
      </div>
      
      <div class="stat-card warning">
        <div class="stat-icon">
          <i class="fas fa-exclamation-triangle"></i>
        </div>
        <div class="stat-content">
          <h3>Suspicious</h3>
          <p class="stat-value">0</p>
        </div>
      </div>
      
      <div class="stat-card danger">
        <div class="stat-icon">
          <i class="fas fa-times-circle"></i>
        </div>
        <div class="stat-content">
          <h3>Not Found</h3>
          <p class="stat-value">0</p>
        </div>
      </div>
    </section>

    <!-- Action Panels -->
    <section class="action-panels">
      
      <!-- SMS Payment Panel -->
      <div class="panel">
        <div class="panel-header">
          <h2><i class="fas fa-sms"></i> Add Payment SMS</h2>
        </div>
        <div class="panel-content">
          <div class="input-group">
            <label for="smsMessage">Paste SMS Message</label>
            <textarea id="smsMessage" placeholder="Paste M-PESA or bank SMS message here..." rows="4"></textarea>
          </div>
          <button class="btn btn-primary">
            <i class="fas fa-search"></i>
            Preview Payment Details
          </button>
        </div>
      </div>

      <!-- Manual Receipt Panel -->
      <div class="panel">
        <div class="panel-header">
          <h2><i class="fas fa-receipt"></i> Add Caretaker Receipt</h2>
        </div>
        <div class="panel-content">
          <div class="form-grid">
            <div class="input-group">
              <label for="houseNumber">House/Unit Number</label>
              <input type="text" id="houseNumber" placeholder="e.g., A12, Unit 5, House 23">
            </div>
            
            <div class="input-group">
              <label for="amount">Amount (KES)</label>
              <input type="number" id="amount" placeholder="e.g., 15000">
            </div>
            
            <div class="input-group">
              <label for="paymentDate">Payment Date</label>
              <input type="date" id="paymentDate">
            </div>
            
            <div class="input-group">
              <label for="receiptRef">Receipt Reference (Optional)</label>
              <input type="text" id="receiptRef" placeholder="e.g., RCT-001">
            </div>
          </div>

          <div class="input-group">
            <label for="receiptImage">Upload Receipt Picture</label>
            <input type="file" id="receiptImage" accept="image/*" placeholder="Select receipt image">
            <small>Supported formats: JPG, PNG, GIF (Max 5MB)</small>
          </div>
          
          <button class="btn btn-success">
            <i class="fas fa-plus"></i>
            Add Receipt
          </button>
        </div>
      </div>
    </section>

    <!-- Verification Table -->
    <section class="verification-section">
      <div class="panel">
        <div class="panel-header">
          <h2><i class="fas fa-list-check"></i> Receipt Verification</h2>
          <button class="btn btn-outline">
            <i class="fas fa-check-double"></i>
            Verify All
          </button>
        </div>
        
        <div class="table-container">
          <table class="verification-table">
            <thead>
              <tr>
                <th>House</th>
                <th>Amount</th>
                <th>Date</th>
                <th>Receipt Ref</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              <tr class="empty-state">
                <td colspan="6" style="text-align: center; padding: 2rem; color: var(--gray);">
                  <i class="fas fa-inbox" style="font-size: 2rem; margin-bottom: 1rem; display: block;"></i>
                  No receipts added yet. Add your first receipt above.
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </section>

  </main>

  <script src="js/dashboard.js"></script>
</body>
</html>
